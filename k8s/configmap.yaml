apiVersion: v1
kind: ConfigMap
metadata:
  name: dolma-config
data:
  cors_origins: "https://app.dolma-ai.com"
  redis_host: "redis-service"
  redis_port: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: dolma-secrets
type: Opaque
stringData:
  database_url: "postgresql://user:password@postgres-service:5432/dolma_ai"
  jwt_secret: "CHANGE_ME_JWT_SECRET"
  jwt_refresh_secret: "CHANGE_ME_JWT_REFRESH_SECRET"
  claude_api_key: "CHANGE_ME_CLAUDE_API_KEY"
  whatsapp_verify_token: "CHANGE_ME_WHATSAPP_TOKEN"
  instagram_verify_token: "CHANGE_ME_INSTAGRAM_TOKEN"

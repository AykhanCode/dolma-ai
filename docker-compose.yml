version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dolma_postgres
    environment:
      POSTGRES_DB: dolma_ai
      POSTGRES_USER: dolma
      POSTGRES_PASSWORD: dolma_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dolma -d dolma_ai']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dolma_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
